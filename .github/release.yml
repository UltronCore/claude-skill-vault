changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "New Skills"
      labels: ["*"]
      exclude:
        labels: ["chore", "docs", "infra", "refactor"]
    - title: "Skill Updates & Improvements"
      labels: ["*"]
      exclude:
        labels: ["feat", "chore", "docs", "infra"]
    - title: "Infrastructure & Automation"
      labels: ["infra", "chore", "ci"]
    - title: "Documentation"
      labels: ["docs"]
    - title: "Other Changes"
      labels: ["*"]
